<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ZOMBIE SURVIVORS</title>
<style>
html,body,div,canvas,button,input,p,h2,span{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;overflow:hidden;}
body{background:#000;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;height:100%;height:100dvh;position:fixed;width:100%;-webkit-overflow-scrolling:none;}
#gameCanvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none;}

/* Audio modal — copied from Zombie Horde */
#audioPermModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
#audioPermCard{background:rgba(10,5,20,0.99);border:2px solid rgba(255,107,53,0.6);border-radius:16px;padding:28px 26px;max-width:340px;width:100%;text-align:center;}
#audioPermCard h2{font-size:13px;letter-spacing:4px;color:#ff6b35;margin-bottom:12px;}
#audioPermCard p{font-size:10px;color:rgba(200,180,160,0.75);line-height:1.8;margin-bottom:8px;}
#audioPermCard .hint{font-size:9px;color:rgba(255,107,53,0.4);margin-bottom:22px;letter-spacing:1px;}
.permBtns{display:flex;flex-direction:column;gap:10px;}
#enableAudioBtn{background:rgba(255,107,53,0.15);border:2px solid rgba(255,107,53,0.8);border-radius:8px;color:#ff6b35;font-family:'Arial Black',Arial,sans-serif;font-size:12px;letter-spacing:2px;padding:14px 20px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#enableAudioBtn:active{background:rgba(255,107,53,0.3);}
#skipAudioBtn{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.35);font-family:'Arial Black',Arial,sans-serif;font-size:9px;letter-spacing:2px;padding:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* Cog button */
#cogBtn{position:fixed;top:18px;left:20%;z-index:30;pointer-events:auto;background:rgba(10,5,20,0.85);border:1px solid rgba(255,107,53,0.5);border-radius:50%;width:44px;height:44px;font-size:20px;color:rgba(255,107,53,0.85);cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* Cog menu */
#cogMenuOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:80;display:none;align-items:center;justify-content:center;padding:16px;}
#cogMenuOverlay.show{display:flex;}
#cogCard{background:rgba(10,5,20,0.99);border:2px solid rgba(255,107,53,0.4);border-radius:14px;padding:22px 24px;max-width:340px;width:100%;position:relative;color:#fff;}
#cogCard h2{font-size:11px;letter-spacing:4px;color:#ff6b35;margin-bottom:18px;text-align:center;}
#closeCog{position:absolute;top:13px;right:15px;background:transparent;border:none;color:rgba(255,107,53,0.7);font-size:20px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.cogSection label{font-size:8px;letter-spacing:2px;color:rgba(255,107,53,0.7);display:block;margin-bottom:6px;}
#ytInput{width:100%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,107,53,0.3);border-radius:5px;color:#ff8c5a;font-size:9px;padding:7px 9px;font-family:'Arial Black',Arial,sans-serif;outline:none;margin-bottom:7px;}
.cogRow{display:flex;gap:7px;margin-bottom:7px;}
.cogMusicBtn{flex:1;background:transparent;border:1px solid rgba(255,107,53,0.35);border-radius:5px;color:rgba(255,107,53,0.85);font-size:9px;letter-spacing:1px;padding:8px 4px;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#musicStatus{font-size:8px;color:rgba(255,107,53,0.5);min-height:13px;margin-bottom:8px;}
.volRow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.volRow span{font-size:8px;letter-spacing:1px;color:rgba(255,107,53,0.6);min-width:62px;}
.volSlider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(255,107,53,0.25);outline:none;}
.volSlider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#ff6b35;cursor:pointer;}

/* Game overlays */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:79;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.card{background:rgba(5,3,15,0.99);border:2px solid rgba(255,180,0,0.5);border-radius:16px;padding:24px 20px;max-width:400px;width:100%;text-align:center;}
.card h2{font-size:14px;letter-spacing:4px;color:#ffd700;margin-bottom:8px;}
.card p{font-size:10px;color:rgba(255,220,150,0.7);margin-bottom:16px;letter-spacing:1px;line-height:1.6;}
.ugrid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.uc{background:rgba(10,5,25,0.95);border:2px solid rgba(255,180,0,0.4);border-radius:12px;padding:14px 10px;width:108px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.uc:active{border-color:#ffd700;background:rgba(255,180,0,0.12);}
.ui{font-size:30px;margin-bottom:6px;}
.un{font-size:9px;letter-spacing:2px;color:#ffd700;font-weight:900;margin-bottom:4px;}
.ud{font-size:8px;color:rgba(255,220,150,0.6);line-height:1.5;}
.big-btn{background:transparent;border:2px solid currentColor;font-family:'Arial Black',Arial,sans-serif;font-size:12px;letter-spacing:3px;padding:14px 32px;cursor:pointer;border-radius:8px;margin-top:14px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;width:100%;}
.big-btn.orange{color:#ff8800;border-color:#ff8800;}
.sr{font-size:10px;color:#ffcc44;margin:5px 0;letter-spacing:1px;}
#joystickZone{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom, 0px));left:calc(20px + env(safe-area-inset-left, 0px));width:120px;height:120px;z-index:25;touch-action:none;display:none;}
#jBase{position:absolute;left:0;top:0;width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,0.45);border:2px solid rgba(255,180,0,0.25);}
#jThumb{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(255,180,0,0.65);border:2px solid #ffd700;box-shadow:0 0 12px rgba(255,200,0,0.5);left:37px;top:37px;pointer-events:none;}
#puBar{position:fixed;bottom:calc(155px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:7px;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:90vw;}
.pp{background:rgba(0,0,0,0.75);border:2px solid rgba(255,180,0,0.6);border-radius:8px;padding:4px 10px;font-size:9px;color:#ffd700;letter-spacing:1px;white-space:nowrap;}
#waveBanner{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:35;font-size:clamp(22px,6vw,40px);font-weight:900;letter-spacing:5px;color:#ffd700;text-shadow:0 0 28px rgba(255,200,0,0.9);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.4s;line-height:1.3;}
#kingAlert{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);z-index:35;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s;font-size:clamp(16px,5vw,28px);font-weight:900;letter-spacing:3px;color:#ff2200;text-shadow:0 0 24px rgba(255,0,0,0.9);}
#ytPlayerContainer{position:fixed;left:-220px;bottom:0;width:200px;height:200px;pointer-events:none;}
</style>

</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Audio permission modal -->

<div id="audioPermModal">
  <div id="audioPermCard">
    <h2>ZOMBIE SURVIVORS</h2>
    <p>Enable audio for music and sound effects.</p>
    <p class="hint">Toggle music anytime via the ⚙ gear menu</p>
    <div class="permBtns">
      <button id="enableAudioBtn">ENABLE AUDIO &amp; PLAY</button>
      <button id="skipAudioBtn">Play without sound</button>
    </div>
  </div>
</div>

<!-- Cog button -->

<button id="cogBtn">⚙</button>

<!-- Cog menu -->

<div id="cogMenuOverlay">
  <div id="cogCard">
    <button id="closeCog">&#x2715;</button>
    <h2>SETTINGS</h2>
    <div class="cogSection">
      <label>MUSIC — PASTE YOUTUBE LINK</label>
      <input id="ytInput" type="text" placeholder="https://youtube.com/watch?v=..." value="https://youtu.be/XMcbjp4Sq4M">
      <div class="cogRow">
        <button class="cogMusicBtn" id="ytPlay">PLAY</button>
        <button class="cogMusicBtn" id="ytStop">STOP</button>
      </div>
      <div id="musicStatus">No music loaded</div>
      <div class="volRow"><span>MUSIC VOL</span><input type="range" class="volSlider" id="musicVol" min="0" max="100" value="60"></div>
      <div class="volRow"><span>SFX VOL</span><input type="range" class="volSlider" id="sfxVol" min="0" max="100" value="60"></div>
    </div>
  </div>
</div>

<div id="joystickZone"><div id="jBase"></div><div id="jThumb"></div></div>
<div id="puBar"></div>
<div id="waveBanner"></div>
<div id="kingAlert">👑 ZOMBIE KINGS INCOMING!</div>

<div class="overlay" id="upgradeOverlay">
  <div class="card">
    <h2>UPGRADE TIME</h2>
    <p id="utgTxt"></p>
    <div class="ugrid" id="ugrid"></div>
  </div>
</div>
<div class="overlay" id="chestOverlay">
  <div class="card" style="border-color:rgba(180,80,255,0.7);">
    <h2 style="color:#cc66ff;">💜 BOSS CHEST</h2>
    <p id="chestTxt"></p>
    <div class="ugrid" id="chestGrid"></div>
  </div>
</div>
<div class="overlay" id="gameOverScreen">
  <div class="card" style="border-color:rgba(255,68,68,0.5);">
    <h2 style="color:#ff4444;">SQUAD WIPED</h2>
    <div id="goStats"></div>
    <button class="big-btn orange" id="retryBtn">TRY AGAIN</button>
  </div>
</div>

<div id="ytPlayerContainer"></div>
<script>
'use strict';
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var VW=0,VH=0,WW=6400,WH=4800;
function resize(){VW=canvas.width=window.innerWidth;VH=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,120);});
resize();

// AUDIO
var AC=null;
function unlockAudio(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(AC&&AC.state==='suspended')AC.resume();}
function tone(f,t,v,d,delay){if(!AC)return;try{var o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'square';o.frequency.value=f;var s=AC.currentTime+(delay||0);g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.01);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.start(s);o.stop(s+d+0.05);}catch(e){}}
function sfxShoot(){tone(880,'square',0.09,0.04);}
function sfxDie(){tone(110,'sawtooth',0.14,0.18);}
function sfxPickup(){tone(660,'sine',0.1,0.07);tone(880,'sine',0.1,0.07,0.06);}
function sfxMagnet(){tone(900,'sine',0.12,0.25);tone(1100,'sine',0.1,0.2,0.1);}
function sfxKillAll(){tone(55,'sawtooth',0.28,0.6);tone(80,'sawtooth',0.22,0.45,0.12);}
function sfxSoldier(){tone(520,'sine',0.14,0.09);tone(660,'sine',0.14,0.09,0.1);tone(880,'sine',0.14,0.14,0.2);}
function sfxUpgrade(){tone(440,'sine',0.12,0.09);tone(550,'sine',0.12,0.09,0.1);tone(660,'sine',0.12,0.09,0.2);tone(880,'sine',0.15,0.18,0.3);}
function sfxKing(){tone(55,'sawtooth',0.32,0.55);tone(40,'sawtooth',0.28,0.65,0.18);}
function sfxWave(){tone(440,'sine',0.12,0.12);tone(660,'sine',0.14,0.15,0.15);tone(880,'sine',0.16,0.18,0.3);}
function sfxLaser(){tone(1400,'sine',0.08,0.07);}
function sfxFlame(){tone(200,'sawtooth',0.06,0.09);}
function sfxHurt(){tone(160,'sawtooth',0.2,0.12);}
function sfxMedBoss(){tone(180,'sawtooth',0.18,0.3);tone(120,'sawtooth',0.15,0.35,0.15);}
function sfxChest(){tone(660,'sine',0.14,0.1);tone(880,'sine',0.14,0.1,0.1);tone(1100,'sine',0.16,0.15,0.2);tone(1320,'sine',0.16,0.2,0.35);}

// WAVE THEMES
var THEMES=[
{name:'GRASSLAND',   base:'#1e3d10',grassTone:'#284e15',patchColor:'#162e0b',dirtColor:'#5c4208',skyTint:null,        weather:'clear',  treeStyle:'oak',   flowerColors:['#ff6688','#ffcc00','#ffffff'],nightOverlay:0,   fogColor:null,                  rainColor:null},
{name:'DESERT',      base:'#8a6020',grassTone:'#a07430',patchColor:'#7a5018',dirtColor:'#5a3808',skyTint:'rgba(255,180,60,0.08)',weather:'clear',treeStyle:'cactus',flowerColors:['#ff4488','#ffaa00'],nightOverlay:0,fogColor:null,rainColor:null},
{name:'RAIN FOREST', base:'#162c0c',grassTone:'#1e3a10',patchColor:'#102208',dirtColor:'#3a2810',skyTint:'rgba(40,60,80,0.25)',weather:'rain',  treeStyle:'pine',  flowerColors:['#aaffcc','#88ddff'],  nightOverlay:0.15,fogColor:null,                 rainColor:'rgba(180,220,255,0.55)'},
{name:'SNOWSTORM',   base:'#8098aa',grassTone:'#90a8bc',patchColor:'#6a8898',dirtColor:'#506070',skyTint:'rgba(200,220,255,0.3)',weather:'snow', treeStyle:'pine',  flowerColors:['#ffffff','#aaddff'],  nightOverlay:0.1, fogColor:'rgba(200,220,255,0.35)',rainColor:'rgba(240,248,255,0.7)'},
{name:'SWAMP',       base:'#141e0a',grassTone:'#1c2a0e',patchColor:'#0e1806',dirtColor:'#2e3c10',skyTint:'rgba(20,40,10,0.2)', weather:'fog',   treeStyle:'dead',  flowerColors:['#88ff44','#aabb00'],  nightOverlay:0.2, fogColor:'rgba(60,80,30,0.4)',   rainColor:null},
{name:'NIGHT CITY',  base:'#0c0c14',grassTone:'#141420',patchColor:'#0a0a10',dirtColor:'#202030',skyTint:'rgba(10,10,30,0.6)', weather:'city',  treeStyle:'lamp',  flowerColors:['#ffaa00','#ff4488','#00aaff'],nightOverlay:0.65,fogColor:null,            rainColor:null},
{name:'THUNDERSTORM',base:'#0e1208',grassTone:'#141a0c',patchColor:'#0a0e06',dirtColor:'#262010',skyTint:'rgba(20,30,10,0.4)',weather:'thunder',treeStyle:'pine',  flowerColors:['#ffffaa','#88ff44'],  nightOverlay:0.4, fogColor:'rgba(30,40,20,0.3)',   rainColor:'rgba(150,180,120,0.5)'},
{name:'VOLCANIC',    base:'#180804',grassTone:'#220e06',patchColor:'#120602',dirtColor:'#481400',skyTint:'rgba(180,40,0,0.15)',weather:'ash',   treeStyle:'dead',  flowerColors:['#ff4400','#ff8800'],  nightOverlay:0.3, fogColor:'rgba(80,20,0,0.25)',   rainColor:'rgba(180,80,0,0.3)'},
];

var WORLD_OBJS=[];
var WORLD_PROPS=[];

function buildGround(themeIdx){
var t=THEMES[themeIdx%THEMES.length];
// Build a 1600x1200 tile (repeated across the world) instead of a 6400x4800 canvas
var TW=1600,TH=1200;
var off=document.createElement('canvas');off.width=TW;off.height=TH;
var ox=off.getContext('2d');
ox.fillStyle=t.base;ox.fillRect(0,0,TW,TH);
var seed=themeIdx*1234;
function sr(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;}
// Soft grass-tone blobs
for(var b=0;b<40;b++){
var bx=sr()*TW,by=sr()*TH,br=80+sr()*160;
var grd=ox.createRadialGradient(bx,by,0,bx,by,br);
grd.addColorStop(0,t.patchColor);grd.addColorStop(1,'rgba(0,0,0,0)');
ox.globalAlpha=0.7+sr()*0.25;ox.fillStyle=grd;
ox.beginPath();ox.arc(bx,by,br,0,Math.PI*2);ox.fill();
}
ox.globalAlpha=1;
// Kidney dirt patches
for(var d=0;d<10;d++){
var dx=sr()*TW,dy=sr()*TH,dw=60+sr()*130,dh=40+sr()*80,tilt=(sr()-0.5)*1.2;
ox.save();ox.translate(dx,dy);ox.rotate(tilt);
ox.fillStyle=t.dirtColor;ox.globalAlpha=0.6+sr()*0.3;
ox.beginPath();ox.ellipse(0,0,dw*0.6,dh*0.7,0,0,Math.PI*2);ox.fill();
ox.beginPath();ox.ellipse(dw*0.35,dh*0.2,dw*0.45,dh*0.55,0.4,0,Math.PI*2);ox.fill();
ox.globalAlpha=1;ox.restore();
}
// Grass blades
ox.globalAlpha=0.65;
for(var g2=0;g2<1500;g2++){
var gx=sr()*TW,gy=sr()*TH,gh=3+sr()*7;
ox.strokeStyle=sr()<0.5?t.patchColor:t.dirtColor;ox.lineWidth=1;
ox.beginPath();ox.moveTo(gx,gy);ox.lineTo(gx+(sr()-0.5)*5,gy-gh);ox.stroke();
}
ox.globalAlpha=1;
return off;
}

function buildWorldObjects(themeIdx){
var t=THEMES[themeIdx%THEMES.length];
WORLD_OBJS=[];WORLD_PROPS=[];
var seed2=(themeIdx+7)*9876;
function sr(){seed2=(seed2*1664525+1013904223)&0xffffffff;return(seed2>>>0)/0xffffffff;}
var treeCount=30+Math.floor(sr()*16);
for(var i=0;i<treeCount;i++){
WORLD_OBJS.push({type:'tree',style:t.treeStyle,x:200+sr()*(WW-400),y:200+sr()*(WH-400),
r:18+sr()*14,trunkH:14+sr()*10,color:treeColorFor(t.treeStyle),
burning:false,burnTimer:0,burnLife:15,lit:false,dead:false});
}
var flCount=60+Math.floor(sr()*40);
for(var f=0;f<flCount;f++){
var fc=t.flowerColors[Math.floor(sr()*t.flowerColors.length)];
WORLD_OBJS.push({type:'flower',x:200+sr()*(WW-400),y:200+sr()*(WH-400),color:fc,r:3+sr()*4,count:2+Math.floor(sr()*4)});
}
var barCount=8+Math.floor(sr()*7);
for(var b=0;b<barCount;b++){
WORLD_PROPS.push({type:'barrel',x:300+sr()*(WW-600),y:300+sr()*(WH-600),burning:false,burnTimer:0,burnLife:6,dead:false});
}
var carColors=['#334488','#882222','#447744','#888833','#553322'];
var carCount=4+Math.floor(sr()*5);
for(var c=0;c<carCount;c++){
WORLD_PROPS.push({type:'car',x:300+sr()*(WW-600),y:300+sr()*(WH-600),
angle:sr()*Math.PI*2,color:carColors[Math.floor(sr()*carColors.length)],
burning:false,burnTimer:0,burnLife:12,dead:false});
}
}

function treeColorFor(style){
if(style==='oak')return'#2d6e18';if(style==='pine')return'#1a5010';
if(style==='cactus')return'#2a7030';if(style==='dead')return'#4a3820';
if(style==='lamp')return'#202040';return'#2d6e18';
}

function drawTree(obj,now){
var sx=obj.x-G.camX,sy=obj.y-G.camY;
if(sx<-80||sx>VW+80||sy<-80||sy>VH+80)return;
ctx.save();ctx.translate(sx,sy);
if(obj.burning){
var life=Math.max(0,obj.burnTimer/obj.burnLife);
ctx.globalAlpha=life;
ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.arc(0,-obj.trunkH,obj.r*(0.4+life*0.6),0,Math.PI*2);ctx.fill();
for(var i=0;i<Math.floor(life*8);i++){
var fa=(now*0.003+i*1.3),fr=4+Math.sin(now*0.01+i)*3,fy=-obj.trunkH-fr-Math.sin(now*0.008+i*0.7)*6;
ctx.globalAlpha=life*0.8;ctx.fillStyle=i%2?'#ff6600':'#ffcc00';
ctx.beginPath();ctx.arc(Math.cos(fa)*fr*0.5,fy,2+Math.random()*3,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;ctx.restore();return;
}
if(obj.style==='oak'||!obj.style){
ctx.fillStyle='#5c3d1e';ctx.fillRect(-3,0,6,obj.trunkH*0.7);
ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(4,2,obj.r*0.9,obj.r*0.4,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=obj.color;ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=6;
ctx.beginPath();ctx.arc(0,-obj.trunkH,obj.r,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(-obj.r*0.3,-obj.trunkH-obj.r*0.3,obj.r*0.4,0,Math.PI*2);ctx.fill();
} else if(obj.style==='pine'){
ctx.fillStyle='#5c3d1e';ctx.fillRect(-2,0,4,obj.trunkH*0.5);
ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=4;

function updateWorldFire(g,dt,now){
for(var i=0;i<WORLD_OBJS.length;i++){
var obj=WORLD_OBJS[i];if(obj.type!=='tree'||!obj.burning)continue;
obj.burnTimer-=dt;
if(obj.burnTimer<=0){obj.burning=false;obj.lit=false;obj.dead=true;continue;}
for(var j=0;j<WORLD_OBJS.length;j++){
var other=WORLD_OBJS[j];if(other.type!=='tree'||other.burning||other.lit||other.dead)continue;
var dx=other.x-obj.x,dy=other.y-obj.y;
if(Math.sqrt(dx*dx+dy*dy)<80&&Math.random()<0.004){other.burning=true;other.lit=true;other.burnTimer=other.burnLife;}
}
for(var zi=g.zombies.length-1;zi>=0;zi--){
var z=g.zombies[zi];if(!z.visible)continue;var zdx=z.x-obj.x,zdy=z.y-obj.y;
if(Math.sqrt(zdx*zdx+zdy*zdy)<obj.r*2.5){z.hp-=8*dt;z.flash=0.1;if(z.hp<=0)killZombie(g,zi);}
}
for(var zi2=0;zi2<g.zombies.length;zi2++){
var z2=g.zombies[zi2];if(z2.fireTarget)continue;
var fdx=obj.x-z2.x,fdy=obj.y-z2.y;
if(Math.sqrt(fdx*fdx+fdy*fdy)<300&&Math.random()<0.005)z2.fireTarget={x:obj.x,y:obj.y};
}
}
for(var pi=0;pi<WORLD_PROPS.length;pi++){
var p=WORLD_PROPS[pi];if(!p.burning||p.dead)continue;
p.burnTimer-=dt;
for(var zi3=g.zombies.length-1;zi3>=0;zi3--){
var z3=g.zombies[zi3];if(!z3.visible)continue;var pdx=z3.x-p.x,pdy=z3.y-p.y;
if(Math.sqrt(pdx*pdx+pdy*pdy)<(p.type==='car'?35:20)){z3.hp-=12*dt;z3.flash=0.1;if(z3.hp<=0)killZombie(g,zi3);}
}
for(var zi4=0;zi4<g.zombies.length;zi4++){
var z4=g.zombies[zi4];if(z4.fireTarget)continue;
var fdx2=p.x-z4.x,fdy2=p.y-z4.y;
if(Math.sqrt(fdx2*fdx2+fdy2*fdy2)<250&&Math.random()<0.004)z4.fireTarget={x:p.x,y:p.y};
}
if(p.burnTimer<=0){
if(p.type==='car'){
spawnParts(g,p.x,p.y,'#ff6600',30);spawnParts(g,p.x,p.y,'#ffff00',20);
addFloat(g,p.x,p.y,'BOOM!','#ff8800');
for(var zi5=g.zombies.length-1;zi5>=0;zi5--){
var z5=g.zombies[zi5];if(!z5.visible)continue;var ex=z5.x-p.x,ey=z5.y-p.y;
if(Math.sqrt(ex*ex+ey*ey)<120){z5.hp-=150;z5.flash=0.2;if(z5.hp<=0)killZombie(g,zi5);}
}
g.flash=0.35;g.flashColor='#ff8800';sfxKillAll();
}
p.dead=true;
}
}
}

// Phase within current wave: 'survive'|'escalate'|'panic'
function wavePhase(g){
var dur=waveDuration(g.wave),t=g.waveTime;
if(t<dur/3)return'survive';
if(t<dur*2/3)return'escalate';
return'panic';
}
// King activation time: panic phase start, earlier in later waves
function kingActivationTime(wave){
var dur=waveDuration(wave);
if(wave<=5)return dur*2/3;      // panic phase only
if(wave<=7)return dur/2;         // mid-escalate
return dur/3;                    // early escalate wave 8+
}

// DRAW HELPERS
function rr(x,y,w,h,r){r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

ctx.fillStyle='#f00';ctx.beginPath();ctx.ellipse(-4,-10,1.5,1.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(4,-10,1.5,1.5,0,0,Math.PI*2);ctx.fill();
// mouth + teeth
ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-4,5,0.2,Math.PI-0.2);ctx.stroke();
ctx.fillStyle='#eee';ctx.fillRect(-4,-5,3,3);ctx.fillRect(1,-5,3,3);
// arms swinging
ctx.fillStyle=hc;
ctx.fillRect(-16,2+Math.sin(z.animT*8)*4,7,5);
ctx.fillRect(9,2-Math.sin(z.animT*8)*4,7,5);
// legs
ctx.fillStyle=bc;ctx.fillRect(-8,20,6,8);ctx.fillRect(2,20,6,8);
// king crown
if(z.king){
ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
ctx.beginPath();ctx.moveTo(-10,-18);ctx.lineTo(-10,-27);ctx.lineTo(-5,-21);ctx.lineTo(0,-28);ctx.lineTo(5,-21);ctx.lineTo(10,-27);ctx.lineTo(10,-18);ctx.closePath();ctx.fill();
ctx.shadowBlur=0;
}
// Med boss gem on forehead
if(z.med){
ctx.fillStyle='#ff8800';ctx.shadowColor='#ffaa00';ctx.shadowBlur=6;
ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(4,-14);ctx.lineTo(0,-10);ctx.lineTo(-4,-14);ctx.closePath();ctx.fill();
ctx.shadowBlur=0;
}
// HP bar (always for king/med, only if damaged for normal)
if(z.king||z.med||z.hp<z.maxHp){
var bW=28,bf=(z.hp/z.maxHp)*bW;

ctx.fillStyle=barCol;ctx.fillRect(-bW/2,-34,Math.max(0,bf),5);
}

}

// Draw pickup (zombie horde drawPickup style)
function drawPickupAt(pk,now){

var bob=Math.sin(now*0.003+pk.bob)*4;

var px=sx,py=sy+bob;
if(pk.shape==='circle'){ctx.arc(px,py,16,0,Math.PI*2);}
else if(pk.shape==='diamond'){ctx.moveTo(px,py-17);ctx.lineTo(px+13,py);ctx.lineTo(px,py+17);ctx.lineTo(px-13,py);ctx.closePath();}
else if(pk.shape==='star'){
for(var si=0;si<5;si++){var a1=(si*4-1)*Math.PI/5-Math.PI/2,a2=(si*4+1)*Math.PI/5-Math.PI/2;if(si===0)ctx.moveTo(px+16*Math.cos(a1),py+16*Math.sin(a1));else ctx.lineTo(px+16*Math.cos(a1),py+16*Math.sin(a1));ctx.lineTo(px+7*Math.cos(a2),py+7*Math.sin(a2));}ctx.closePath();
}else{rr(px-16,py-14,32,28,6);}
ctx.fill();ctx.stroke();
ctx.shadowBlur=0;ctx.fillStyle='#fff';

ctx.fillText(pk.label,px,py);
ctx.restore();
}

// CONTINUOUS ZOMBIE SPAWNER — spawns from screen edges, never on top of player
function spawnZombieBatch(g,count){
var margin=60,minDist=280;
for(var i=0;i<count;i++){
var wx,wy,attempts=0;
// Place on one of the 4 screen edges (world-space edges of viewport + some buffer)
do {
var edge=Math.floor(Math.random()*4);
var ex=g.camX,ey=g.camY,ew=VW,eh=VH;
if(edge===0){wx=ex-margin+Math.random()*(ew+margin*2);wy=ey-margin;}       // top
else if(edge===1){wx=ex-margin+Math.random()*(ew+margin*2);wy=ey+eh+margin;}// bottom
else if(edge===2){wx=ex-margin;wy=ey-margin+Math.random()*(eh+margin*2);}   // left
else{wx=ex+ew+margin;wy=ey-margin+Math.random()*(eh+margin*2);}             // right
wx=Math.max(30,Math.min(WW-30,wx));
wy=Math.max(30,Math.min(WH-30,wy));
attempts++;
} while(attempts<8&&Math.sqrt((wx-g.squadX)*(wx-g.squadX)+(wy-g.squadY)*(wy-g.squadY))<minDist);
var isKing=g.kingsActive&&Math.random()<0.25;
g.spawnQueue.push({x:wx,y:wy,king:isKing,delay:i*0.05});
}
}

function spawnFromQ(g,entry){
var hp,speed;
var soldierCount=g.soldiers.filter(function(s){return !s.dead;}).length||1;
var ph=wavePhase(g);
var phHpMult=ph==='panic'?1.6:ph==='escalate'?1.3:1.0;
if(entry.king){
// Assign king type based on current ground theme
var kingTypes=['grassland','desert','rainforest','snowstorm','swamp','city','thunder','volcanic'];
var kt=kingTypes[g.groundTheme%kingTypes.length];
hp=Math.round(1000*(1+g.wave*0.2));
speed=28+g.wave*2;
g.zombies.push({x:entry.x,y:entry.y,hp:hp,maxHp:hp,speed:speed,king:true,kingType:kt,med:false,flash:0,animT:Math.random()*Math.PI*2,visible:false,
burrowTimer:0,burrowActive:false,freezePulseTimer:12,swampRegenTimer:3,rainforestSummonTimer:20});
} else if(g.oneShotMode){
hp=1;
speed=42+g.wave*4+Math.random()*12;
g.zombies.push({x:entry.x,y:entry.y,hp:hp,maxHp:hp,speed:speed,king:false,med:false,flash:0,animT:Math.random()*Math.PI*2,visible:false});
} else {
var totalWeight=0;
for(var ti=1;ti<=soldierCount;ti++) totalWeight+=(soldierCount+1-ti);
var r=Math.random()*totalWeight,chosenTier=soldierCount,acc=0;
for(var ti2=1;ti2<=soldierCount;ti2++){
acc+=(soldierCount+1-ti2);
if(r<acc){chosenTier=ti2;break;}
}
hp=Math.round(chosenTier*10*(1+g.wave*0.1)*phHpMult);
speed=42+g.wave*4+Math.random()*12;
if(g.zombieFrenzy>0)speed*=1.5;
g.zombies.push({x:entry.x,y:entry.y,hp:hp,maxHp:hp,speed:speed,king:false,med:false,flash:0,animT:Math.random()*Math.PI*2,visible:false});
}
}

function killZombie(g,idx){
var z=g.zombies[idx];
var isMed=z.med===true;
var pts=z.king?500:isMed?200:(10+(g.wave-1)*2);
g.score+=pts;

if(isMed){
// Med boss drops $100-$1500 cash AND opens chest
var chestCash=100+Math.floor(Math.random()*1401);
g.cash+=chestCash; g.totalCash+=chestCash;
spawnParts(g,z.x,z.y,'#cc44ff',22);
addFloat(g,z.x,z.y,'BOSS! +$'+chestCash,'#cc66ff');
sfxDie();
g.zombies.splice(idx,1);

checkCash(g);
// Show chest upgrade menu
showChestMenu(g,chestCash);
return;

}

var cd=z.king?(60+Math.floor(Math.random()*100)):(2+Math.floor(Math.random()*5));
g.cash+=cd; g.totalCash+=cd;
if(Math.random()<(z.king?1:0.38))spawnPickupAt(g,z.x,z.y);
spawnParts(g,z.x,z.y,z.king?'#ff4400':'#44ff44',z.king?18:7);
addFloat(g,z.x,z.y,z.king?'+500':'+'+pts,z.king?'#ff8800':'#ffee44');
sfxDie();

// King death special effects
if(z.king){
if(z.kingType==='rainforest'){g.zombieFrenzy=8;addFloat(g,z.x,z.y,'FRENZY!','#ff4400');}
if(z.kingType==='swamp'){
// Drop extra poison patches on death
for(var sp2=0;sp2<3;sp2++){
g.poisonPatches.push({x:z.x+(Math.random()-0.5)*120,y:z.y+(Math.random()-0.5)*120,r:55,dmg:8,life:12});
}
}
}

g.zombies.splice(idx,1);
checkCash(g);
}

function addPU(g,id){
// Permanent — remove old instance then add with Infinity timer
for(var i=g.activePowerups.length-1;i>=0;i--)if(g.activePowerups[i].id===id)g.activePowerups.splice(i,1);
g.activePowerups.push({id:id,timer:Infinity});
}
function hasPU(g,id){for(var i=0;i<g.activePowerups.length;i++)if(g.activePowerups[i].id===id)return true;return false;}

function applyUpgrade(g,id){
sfxUpgrade();
// Weapon upgrades: replace active weapon
if(id==='pistol'||id==='shotgun'||id==='flamethrower'||id==='machinegun'||id==='laser'){
g.activeWeapon=id;
g.prevWeapon=id;
g.tempWeaponTimer=0;
for(var wi=g.activePowerups.length-1;wi>=0;wi--){
var wid=g.activePowerups[wi].id;
if(wid==='flamethrower'||wid==='machinegun'||wid==='laser')g.activePowerups.splice(wi,1);
}
document.getElementById('upgradeOverlay').classList.remove('show');
g.running=true;
return;
}
if(id==='sawblade'){
var existingCount=g.sawBlades.length;
var newAngle=(Math.PI*2/(existingCount+1))*existingCount;
g.sawBlades.push({angle:newAngle,radius:65,life:Infinity,dmg:35});
var total=g.sawBlades.length;
for(var sb=0;sb<total;sb++) g.sawBlades[sb].angle=(Math.PI*2/total)*sb;
}
else if(id==='drone')spawnAlly(g,'drone');
else if(id==='tank')spawnAlly(g,'tank');
else if(id==='sniper')spawnAlly(g,'sniper');
else if(id==='robot')spawnAlly(g,'robot');
else if(id==='lightning')doLightning(g);
else if(id==='cooldown'){for(var fi2=0;fi2<g.fireTimers.length;fi2++)g.fireTimers[fi2]*=0.5;addPU(g,'cooldown');}
else if(id==='extrahp'){g.soldiers.forEach(function(s){if(!s.dead){s.hp++;s.maxHp++;}});}
else if(id==='shield'){g.shieldHits+=5;}
else if(id==='speedboost')addPU(g,'speedboost');
else if(id==='multishot')addPU(g,'multishot');
else if(id==='vampire')addPU(g,'vampire');
else if(id==='explosion')addPU(g,'explosion');
else if(id==='freeze')addPU(g,'freeze');
else if(id==='aura'){if(g.auraLevel<4)g.auraLevel++;}
else if(id==='doublefire'){addPU(g,'doublefire');for(var fi3=0;fi3<g.fireTimers.length;fi3++)g.fireTimers[fi3]*=0.5;}
else if(id==='bigbullets')addPU(g,'bigbullets');
document.getElementById('upgradeOverlay').classList.remove('show');
g.running=true;
}

function spawnAlly(g,type){
var hp=type==='tank'?200:type==='robot'?100:50;
var life=type==='sniper'?99999:type==='tank'?120:90;
var fr=type==='sniper'?2.5:type==='tank'?1.8:type==='drone'?0.8:1.0;
g.allies.push({type:type,x:g.squadX+(Math.random()-0.5)*80,y:g.squadY+(Math.random()-0.5)*80,
hp:hp,maxHp:hp,life:life,fireTimer:0,fireRate:fr,angle:0});
}

function doLightning(g){
for(var i=g.zombies.length-1;i>=0;i--){var z=g.zombies[i];var dx=z.x-g.squadX,dy=z.y-g.squadY;if(Math.sqrt(dx*dx+dy*dy)<320){z.hp-=200;z.flash=0.15;if(z.hp<=0)killZombie(g,i);}}
g.flash=0.35;g.flashColor='#aaffff';spawnParts(g,g.squadX,g.squadY,'#00ffff',28);
}

// FIRING — weapon determined solely by g.activeWeapon (no stacking)
function fireSoldier(g,si){
var s=g.soldiers[si];if(!s||s.dead)return;
var sx=g.squadX+s.offX,sy=g.squadY+s.offY;
var multi=hasPU(g,'multishot'),bigbullet=hasPU(g,'bigbullets');
var doFreeze=hasPU(g,'freeze'),doExplode=hasPU(g,'explosion');
var BSPD=500;
var weap=g.activeWeapon||'pistol';

if(weap==='pistol'){
var pa=s.angle;
g.bullets.push({x:sx,y:sy,dx:Math.cos(pa)*BSPD*1.1,dy:Math.sin(pa)*BSPD*1.1,
dmg:bigbullet?12:5,life:1.8,laser:false,flame:false,mgun:false,
freeze:doFreeze,explode:doExplode});
sfxShoot();

} else if(weap==='shotgun'){
var pellets=multi?5:3;
for(var p=0;p<pellets;p++){
var sp=(p-(pellets-1)/2)*0.18;
var a=s.angle+sp;
g.bullets.push({x:sx,y:sy,dx:Math.cos(a)*BSPD,dy:Math.sin(a)*BSPD,
dmg:bigbullet?30:10,life:1.6,laser:false,flame:false,mgun:false,
freeze:doFreeze,explode:doExplode});
}
sfxShoot();

} else if(weap==='machinegun'){
var mgcount=multi?6:4;
for(var mg=0;mg<mgcount;mg++){
var mgsp=(Math.random()-0.5)*0.35,mga=s.angle+mgsp;
g.bullets.push({x:sx,y:sy,dx:Math.cos(mga)*BSPD*1.2,dy:Math.sin(mga)*BSPD*1.2,
dmg:bigbullet?20:6,life:1.4,laser:false,flame:false,mgun:true,
freeze:doFreeze,explode:doExplode});
}
sfxShoot();

} else if(weap==='flamethrower'){
var fcount=multi?5:3;
for(var f=0;f<fcount;f++){
var fsp=(Math.random()-0.5)*0.65,fa=s.angle+fsp;
g.bullets.push({x:sx,y:sy,dx:Math.cos(fa)*BSPD*0.7,dy:Math.sin(fa)*BSPD*0.7,
dmg:8,life:0.38,laser:false,flame:true,mgun:false,freeze:false,explode:doExplode});
}
sfxFlame();

} else if(weap==='laser'){
var lcount=multi?3:1;
for(var lm=0;lm<lcount;lm++){
var lsp=(lm-Math.floor(lcount/2))*0.18,la=s.angle+lsp;
g.bullets.push({x:sx,y:sy,dx:Math.cos(la)*BSPD*2,dy:Math.sin(la)*BSPD*2,
dmg:bigbullet?80:40,life:1.4,laser:true,flame:false,mgun:false,
freeze:doFreeze,explode:false});
}
sfxLaser();
}
}

function applyMagnet(g){sfxMagnet();for(var i=0;i<g.pickups.length;i++){var p=g.pickups[i];if(p.collected)continue;var dx=g.squadX-p.x,dy=g.squadY-p.y;var d=Math.sqrt(dx*dx+dy*dy);if(d<500){p.x+=dx*0.92;p.y+=dy*0.92;}}g.flash=0.2;g.flashColor='#aaccff';}
function applyKillAll(g){sfxKillAll();for(var i=g.zombies.length-1;i>=0;i--)killZombie(g,i);g.flash=0.55;g.flashColor='#ff8800';addFloat(g,g.squadX,g.squadY,'KILL ALL!','#ff8800');}

g.activePowerups=[];
g.activeWeapon='pistol';
g.prevWeapon='pistol';
g.tempWeaponTimer=0;
g.auraLevel=0;
g.squadSlow=0;

g.zombieFrenzy=0;
g.cash=0;g.totalCash=0;
g.wave=nextWave;g.waveTime=0;g.gameTime=0;
g.spawnTick=0;g.spawnWindow=0;g.spawnBatch=1;g.spawnQueue=[];g.spawnQT=0;g.subWave=1;
g.kingsActive=false;g.kingCount=0;
g.oneShotMode=(nextWave===1);
g.groundTheme=nextTheme;g.groundCanvas=null;
g.flash=0.7;g.flashColor='#ffffff';
g.pickupSpawnT=0;g.medBossTimer=60;g.pendingChestLoot=0;
g.thunderTimer=8+Math.random()*12;g.propSpawnTimer=20;
g.running=true;g.gameOver=false;
g.score=keepScore;
cashTierIdx=0;
initSoldiers(g);
buildWorldObjects(nextTheme);
showBanner('WAVE '+nextWave+'\n'+THEMES[nextTheme%THEMES.length].name);
sfxWave();
}

function showBanner(txt){
var el=document.getElementById('waveBanner');
el.innerHTML=txt.replace('\n','<br>');el.style.opacity='1';
setTimeout(function(){el.style.opacity='0';},2800);
}
function showKingAlert(){var el=document.getElementById('kingAlert');el.style.opacity='1';setTimeout(function(){el.style.opacity='0';},3000);}

// UPDATE
function update(now){
if(!G||!G.running)return;
var dt=Math.min((now-lastTime)/1000,0.05);
lastTime=now;

/// Aura: damage nearby zombies, 4 levels (80/140/200/300px, 20/35/55/120 dmg/s)
if(G.auraLevel>0){
var auraR=[0,80,140,200,300][G.auraLevel]||80;
var auraDmg=[0,20,35,55,120][G.auraLevel]||20;
var instantKill=(G.auraLevel>=4);
for(var ai2=G.zombies.length-1;ai2>=0;ai2--){
var az=G.zombies[ai2];
if(!az.visible)continue;
var adx=az.x-G.squadX,ady=az.y-G.squadY;
if(Math.sqrt(adx*adx+ady*ady)<auraR){
if(instantKill&&!az.boss&&!az.king){killZombie(G,ai2);continue;}
az.hp-=auraDmg*dt;az.flash=0.05;if(az.hp<=0)killZombie(G,ai2);
}
}
}

// Squad speed with speedboost
var squadSpd=(hasPU(G,'speedboost')?252:180)*(G.squadSlow>0?0.4:1);

// Move squad
if(jsActive){
var nx=Math.max(30,Math.min(WW-30,G.squadX+jsVX*squadSpd*dt));
var ny=Math.max(30,Math.min(WH-30,G.squadY+jsVY*squadSpd*dt));
if(!collidesWithTree(nx,ny,12)){G.squadX=nx;G.squadY=ny;}
if(Math.abs(jsVX)>0.1||Math.abs(jsVY)>0.1){
squadMoveAngle=Math.atan2(jsVY,jsVX);
recalcSoldierAngles(G);
}
}

// Camera
G.camX=Math.max(0,Math.min(WW-VW,G.squadX-VW/2));
G.camY=Math.max(0,Math.min(WH-VH,G.squadY-VH/2));

G.waveTime+=dt;G.gameTime+=dt;

// One-shot expires 60s into wave 1
if(G.wave===1&&G.waveTime>60)G.oneShotMode=false;

// Kings activate at kingActivationTime
var kAct=kingActivationTime(G.wave);
if(G.waveTime>=kAct&&!G.kingsActive){G.kingsActive=true;G.kingCount=2+G.wave;sfxKing();showKingAlert();}
if(G.kingsActive&&G.waveTime>=kAct){var mp=Math.floor((G.waveTime-kAct)/60),tgt=(2+G.wave)*Math.pow(2,mp);if(tgt>G.kingCount)G.kingCount=Math.min(tgt,60);}

// Advance wave using wave duration
if(G.waveTime>=waveDuration(G.wave))advanceWave(G);

// Medium boss interval scales with wave
G.medBossTimer-=dt;
if(G.medBossTimer<=0){spawnMedBoss(G);G.medBossTimer=medBossInterval(G.wave);}

// Squad slow timer
if(G.squadSlow>0)G.squadSlow=Math.max(0,G.squadSlow-dt);

// Zombie frenzy timer
if(G.zombieFrenzy>0)G.zombieFrenzy=Math.max(0,G.zombieFrenzy-dt);

// Poison patches decay
if(G.poisonPatches&&G.poisonPatches.length){
for(var pi2=G.poisonPatches.length-1;pi2>=0;pi2--){
var pp=G.poisonPatches[pi2];
pp.life-=dt;
if(pp.life<=0){G.poisonPatches.splice(pi2,1);continue;}
var ppdx=G.squadX-pp.x,ppdy=G.squadY-pp.y;
if(Math.sqrt(ppdx*ppdx+ppdy*ppdy)<pp.r){
G.soldiers.forEach(function(s){if(!s.dead){s.hp-=pp.dmg*dt;if(s.hp<=0)s.dead=true;}});
}
}
}

// Supply drop state machine (wave 1 only)
if(G.wave===1&&!G.supplyDrop&&G.waveTime>=90){
G.supplyDrop={x:G.squadX+(Math.random()-0.5)*400,y:G.squadY+(Math.random()-0.5)*400,state:'incoming',timer:15,reward:'shotgun'};
}
if(G.supplyDrop){
var sd=G.supplyDrop;
if(sd.state==='incoming'){sd.timer-=dt;if(sd.timer<=0)sd.state='landed';}
else if(sd.state==='landed'){
var sddx=G.squadX-sd.x,sddy=G.squadY-sd.y;
if(Math.sqrt(sddx*sddx+sddy*sddy)<50){
applyUpgrade(G,'shotgun');
addFloat(G,sd.x,sd.y,'SUPPLY DROP!','#ffff00');
G.supplyDrop=null;
}
}
}

// Thunder: randomly zap zombies in thunderstorm wave
var curTheme=THEMES[G.groundTheme%THEMES.length];
if(curTheme.weather==='thunder'){
G.thunderTimer-=dt;
if(G.thunderTimer<=0){triggerThunderbolt(G);G.thunderTimer=6+Math.random()*10;}
}

// Prop spawn timer
G.propSpawnTimer-=dt;
if(G.propSpawnTimer<=0){spawnPropNearby(G);G.propSpawnTimer=25+Math.random()*20;}

// World fire update
updateWorldFire(G,dt,lastTime);

// Soldier unlock
for(var ui=1;ui<SOLDIER_UNLOCK.length;ui++)if(G.soldiers.length<ui+1&&G.score>=SOLDIER_UNLOCK[ui])addSoldier(G);

// ZOMBIE SPAWNER — every 1s, capped ramp to prevent crash
var MAX_ZOMBIES=200;
G.spawnTick+=dt;
if(G.spawnTick>=1){
G.spawnTick-=1;
var currentTotal=G.zombies.length+G.spawnQueue.length;
if(currentTotal<MAX_ZOMBIES){
var elapsed=G.waveTime;
var ph=wavePhase(G);
var count=Math.min(25,Math.floor(1+elapsed/2));
count=Math.max(1,Math.round(count*(1+G.wave*0.15)));
if(ph==='survive')count=Math.max(1,Math.floor(count/3));
else if(ph==='panic')count=Math.min(MAX_ZOMBIES,count*2);
count=Math.min(count,MAX_ZOMBIES-currentTotal);
G.spawnBatch=count;
G.subWave=Math.floor(elapsed)+1;
spawnZombieBatch(G,count);
}
}
// Process spawn queue
if(G.spawnQueue.length>0){
G.spawnQT+=dt;
while(G.spawnQueue.length>0&&G.spawnQT>=G.spawnQueue[0].delay){
var entry=G.spawnQueue.shift();
G.spawnQT-=entry.delay;
spawnFromQ(G,entry);
}
}

// Scatter pickups
G.pickupSpawnT-=dt;
if(G.pickupSpawnT<=0){if(G.pickups.length<55)spawnPickupAt(G,undefined,undefined,undefined);G.pickupSpawnT=1.8+Math.random()*2.2;}

// Fire timers — rate based on active weapon
for(var fi=0;fi<G.soldiers.length;fi++){
if(G.soldiers[fi].dead)continue;
var weap=G.activeWeapon||'pistol';
var rate=weap==='pistol'?2.0:weap==='machinegun'?0.1:weap==='flamethrower'?0.08:weap==='laser'?0.6:1.5;
if(hasPU(G,'doublefire'))rate*=0.5;
if(hasPU(G,'cooldown'))rate*=0.5;
G.fireTimers[fi]-=dt;
if(G.fireTimers[fi]<=0){fireSoldier(G,fi);G.fireTimers[fi]=rate+Math.random()*0.05;}
}

// Bullets
for(var bi=G.bullets.length-1;bi>=0;bi--){
var b=G.bullets[bi];
b.x+=b.dx*dt;b.y+=b.dy*dt;b.life-=dt;
if(b.life<=0||b.x<0||b.x>WW||b.y<0||b.y>WH){G.bullets.splice(bi,1);continue;}
for(var zi=G.zombies.length-1;zi>=0;zi--){
var z=G.zombies[zi];
if(!z.visible)continue;
var bdx=b.x-z.x,bdy=b.y-z.y;
var bR=z.king?52:z.med?30:20;
if(bdx*bdx+bdy*bdy<bR*bR){
// All zombies take bullet damage normally; hit radius covers full body
z.hp-=b.dmg;z.flash=0.12;
if(b.freeze)z.speed=Math.max(10,z.speed*0.5);
if(b.explode){
for(var ei=G.zombies.length-1;ei>=0;ei--){
if(ei===zi)continue;
var ez=G.zombies[ei];var ex=ez.x-b.x,ey2=ez.y-b.y;
if(Math.sqrt(ex*ex+ey2*ey2)<50){ez.hp=0;ez.flash=0.1;killZombie(G,ei);}
}
spawnParts(G,b.x,b.y,'#ff8800',6);
}
if(z.hp<=0){
if(hasPU(G,'vampire')){
var ws=G.soldiers.filter(function(s){return !s.dead&&s.hp<s.maxHp;});
if(ws.length>0)ws[0].hp++;
}
killZombie(G,zi);
}
if(!b.laser){G.bullets.splice(bi,1);break;}
}
}
// Flame bullets also ignite world objects
if(b.flame)igniteSomethingAt(b.x,b.y);
}

// Zombies
for(var zi2=G.zombies.length-1;zi2>=0;zi2--){
var z2=G.zombies[zi2];
z2.animT+=dt;if(z2.flash>0)z2.flash-=dt*5;
// Update visibility: become visible once 10% onto screen from any edge
if(!z2.visible){
var zsx=z2.x-G.camX,zsy=z2.y-G.camY;
var thX=VW*0.10,thY=VH*0.10;
if(zsx>thX&&zsx<VW-thX&&zsy>thY&&zsy<VH-thY)z2.visible=true;
}
var zdx=G.squadX-z2.x,zdy=G.squadY-z2.y,zd=Math.sqrt(zdx*zdx+zdy*zdy);
// King special behaviors
if(z2.king&&z2.visible){
var kt=z2.kingType||'grassland';
if(kt==='desert'){
// Zigzag movement + periodic burrow
z2.burrowTimer=(z2.burrowTimer||0)-dt;
if(z2.burrowTimer<=0&&!z2.burrowActive){
z2.burrowActive=true;z2.burrowTimer=2;
// Reappear near player
z2.x=G.squadX+(Math.random()-0.5)*180;z2.y=G.squadY+(Math.random()-0.5)*180;
addFloat(G,z2.x,z2.y,'BURROW!','#cc8800');
} else if(z2.burrowActive&&z2.burrowTimer<=0){
z2.burrowActive=false;z2.burrowTimer=8+Math.random()*6;
}
// Zigzag angle offset
z2.zigAngle=(z2.zigAngle||0)+dt*2.5;
var zza=Math.atan2(zdy,zdx)+Math.sin(z2.zigAngle)*0.6;
if(!z2.burrowActive&&zd>0){z2.x+=Math.cos(zza)*z2.speed*dt;z2.y+=Math.sin(zza)*z2.speed*dt;}
} else if(kt==='snowstorm'){
// Periodic freeze pulse slows squad
z2.freezePulseTimer=(z2.freezePulseTimer||12)-dt;
if(z2.freezePulseTimer<=0&&zd<300){
G.squadSlow=3;z2.freezePulseTimer=12;
addFloat(G,z2.x,z2.y,'FREEZE PULSE','#aaddff');
G.flash=0.2;G.flashColor='#aaddff';
}
if(zd>0){z2.x+=zdx/zd*z2.speed*dt;z2.y+=zdy/zd*z2.speed*dt;}
} else if(kt==='swamp'){
// Slow regeneration + drop poison patches while moving
z2.swampRegenTimer=(z2.swampRegenTimer||3)-dt;
if(z2.swampRegenTimer<=0){z2.hp=Math.min(z2.maxHp,z2.hp+z2.maxHp*0.02);z2.swampRegenTimer=3;}
z2.poisonDropTimer=(z2.poisonDropTimer||4)-dt;
if(z2.poisonDropTimer<=0){
G.poisonPatches.push({x:z2.x,y:z2.y,r:45,dmg:6,life:8});
z2.poisonDropTimer=4+Math.random()*2;
}
if(zd>0){z2.x+=zdx/zd*z2.speed*dt;z2.y+=zdy/zd*z2.speed*dt;}
} else if(kt==='rainforest'){
// Periodically summons extra zombies
z2.rainforestSummonTimer=(z2.rainforestSummonTimer||20)-dt;
if(z2.rainforestSummonTimer<=0){
for(var rs=0;rs<3;rs++){
var rsx=z2.x+(Math.random()-0.5)*150,rsy=z2.y+(Math.random()-0.5)*150;
G.spawnQueue.push({x:rsx,y:rsy,king:false,delay:rs*0.1});
}
z2.rainforestSummonTimer=20;addFloat(G,z2.x,z2.y,'SUMMON!','#44ff44');
}
if(zd>0){z2.x+=zdx/zd*z2.speed*dt;z2.y+=zdy/zd*z2.speed*dt;}
} else {
// Default (grassland + others): straight charge
if(zd>0){z2.x+=zdx/zd*z2.speed*dt;z2.y+=zdy/zd*z2.speed*dt;}
}
} else {
// If zombie is attracted to a fire, steer toward it instead of squad
if(z2.fireTarget){
var ftdx=z2.fireTarget.x-z2.x,ftdy=z2.fireTarget.y-z2.y,ftd=Math.sqrt(ftdx*ftdx+ftdy*ftdy);
if(ftd<20)z2.fireTarget=null;
else{
// Sprint toward fire at ~3x normal speed
var fireSpd=Math.max(z2.speed*3,200);
z2.x+=ftdx/ftd*fireSpd*dt;z2.y+=ftdy/ftd*fireSpd*dt;
}
} else if(zd>0){z2.x+=zdx/zd*z2.speed*dt;z2.y+=zdy/zd*z2.speed*dt;}
}
var cR=z2.king?44:z2.med?28:18;
if(zd<cR&&z2.visible){
if(G.shieldHits>0){G.shieldHits--;G.flash=0.2;G.flashColor='#4444ff';G.zombies.splice(zi2,1);continue;}
var alive=[];for(var si2=0;si2<G.soldiers.length;si2++)if(!G.soldiers[si2].dead)alive.push(G.soldiers[si2]);
if(alive.length>0){var hit=alive[Math.floor(Math.random()*alive.length)];hit.hp--;hit.flash=0.3;sfxHurt();if(hit.hp<=0){hit.dead=true;spawnParts(G,G.squadX+hit.offX,G.squadY+hit.offY,'#ff4444',14);}}
G.flash=0.15;G.flashColor='#ff2200';

  G.zombies.splice(zi2,1);
  var allDead=true;for(var sd=0;sd<G.soldiers.length;sd++)if(!G.soldiers[sd].dead){allDead=false;break;}
  if(allDead)endGame();
}

}

// Pickups
for(var pi=G.pickups.length-1;pi>=0;pi--){
var pk=G.pickups[pi];pk.age+=dt;
if(pk.collected||pk.age>pk.maxAge){G.pickups.splice(pi,1);continue;}
var pdx=G.squadX-pk.x,pdy=G.squadY-pk.y,pd=Math.sqrt(pdx*pdx+pdy*pdy);
if(pd<32){
pk.collected=true;sfxPickup();
if(pk.type==='coin'||pk.type==='gem'||pk.type==='gold'){G.cash+=pk.value;G.totalCash+=pk.value;G.score+=pk.value;addFloat(G,pk.x,pk.y,'+$'+pk.value,'#ffd700');checkCash(G);}
else if(pk.type==='food'){var wd=G.soldiers.filter(function(s){return !s.dead&&s.hp<s.maxHp;});if(wd.length)wd[0].hp=Math.min(wd[0].hp+1,wd[0].maxHp);addFloat(G,pk.x,pk.y,'+HP','#44ff88');}
else if(pk.type==='flame'){if(G.tempWeaponTimer<=0)G.prevWeapon=G.activeWeapon;G.activeWeapon='flamethrower';G.tempWeaponTimer=15;}
else if(pk.type==='mgun'){if(G.tempWeaponTimer<=0)G.prevWeapon=G.activeWeapon;G.activeWeapon='machinegun';G.tempWeaponTimer=15;}
else if(pk.type==='laser'){if(G.tempWeaponTimer<=0)G.prevWeapon=G.activeWeapon;G.activeWeapon='laser';G.tempWeaponTimer=15;}
else if(pk.type==='magnet')applyMagnet(G);
else if(pk.type==='killall')applyKillAll(G);
}
}

// Temp weapon timer — revert to permanent weapon when expired
if(G.tempWeaponTimer>0){
G.tempWeaponTimer-=dt;
if(G.tempWeaponTimer<=0){G.activeWeapon=G.prevWeapon||'pistol';G.tempWeaponTimer=0;}
}
// Powerups are permanent — no timer decrement needed

// Saw blades
for(var sbi=G.sawBlades.length-1;sbi>=0;sbi--){
var sb=G.sawBlades[sbi];sb.life-=dt;sb.angle+=4*dt;
if(sb.life<=0){G.sawBlades.splice(sbi,1);continue;}
var sbx=G.squadX+Math.cos(sb.angle)*sb.radius,sby=G.squadY+Math.sin(sb.angle)*sb.radius;
for(var zi3=G.zombies.length-1;zi3>=0;zi3--){var z3=G.zombies[zi3];if(!z3.visible)continue;var sd=sbx-z3.x,sdd=sby-z3.y;var sR=z3.king?44:16;if(sd*sd+sdd*sdd<sR*sR){z3.hp-=sb.dmg*dt*4;z3.flash=0.1;if(z3.hp<=0)killZombie(G,zi3);}}
}

// Allies — tank/robot/drone follow squad; sniper is stationary
for(var ai=G.allies.length-1;ai>=0;ai--){
var ally=G.allies[ai];
ally.life-=dt;if(ally.life<=0||ally.hp<=0){G.allies.splice(ai,1);continue;}
// Follow squad (not sniper)
if(ally.type!=='sniper'){
var afdx=G.squadX-ally.x,afdy=G.squadY-ally.y;
var afd=Math.sqrt(afdx*afdx+afdy*afdy);
if(afd>80){var aspd=ally.type==='tank'?90:130;ally.x+=afdx/afd*aspd*dt;ally.y+=afdy/afd*aspd*dt;}
if(ally.type==='tank'&&afd>10)ally.angle=Math.atan2(afdy,afdx);
}
// Fire at nearest zombie
ally.fireTimer-=dt;
if(ally.fireTimer<=0){
ally.fireTimer=ally.fireRate;
var near=null,nearD=9999;
for(var zi4=0;zi4<G.zombies.length;zi4++){var z4=G.zombies[zi4];if(!z4.visible)continue;var adx=z4.x-ally.x,ady=z4.y-ally.y,ad=Math.sqrt(adx*adx+ady*ady);if(ad<nearD){nearD=ad;near=z4;}}
if(near){var adx2=near.x-ally.x,ady2=near.y-ally.y,aL=Math.sqrt(adx2*adx2+ady2*ady2)||1;var admg=ally.type==='tank'?60:ally.type==='sniper'?150:25;G.bullets.push({x:ally.x,y:ally.y,dx:adx2/aL*520,dy:ady2/aL*520,dmg:admg,life:3,laser:ally.type==='sniper',flame:false,freeze:false,explode:false});sfxShoot();}
}
}

// Particles + floats
for(var parti=G.particles.length-1;parti>=0;parti--){var p=G.particles[parti];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.decay;if(p.life<=0)G.particles.splice(parti,1);}
for(var fli=G.floats.length-1;fli>=0;fli--){var fl=G.floats[fli];fl.y+=fl.vy;fl.alpha-=0.018;if(fl.alpha<=0)G.floats.splice(fli,1);}
if(G.flash>0)G.flash-=dt*3.5;
}

function endGame(){
if(!G)return;G.running=false;G.gameOver=true;
document.getElementById('goStats').innerHTML='<div class="sr">SCORE: '+G.score.toLocaleString()+'</div><div class="sr">WAVE '+G.wave+' / SUB-WAVE '+G.subWave+'</div><div class="sr">CASH: $'+G.totalCash.toLocaleString()+'</div><div class="sr">TIME: '+Math.floor(G.gameTime/60)+'m '+Math.floor(G.gameTime%60)+'s</div>';
document.getElementById('gameOverScreen').classList.add('show');
}

// DRAW
function draw(now){
if(!G)return;
if(!G.groundCanvas)G.groundCanvas=buildGround(G.groundTheme);
ctx.clearRect(0,0,VW,VH);

// Ground
ctx.save();ctx.translate(-Math.floor(G.camX),-Math.floor(G.camY));
// Tile the ground canvas across the full world
if(G.groundCanvas){
var TW=G.groundCanvas.width,TH=G.groundCanvas.height;
var startCol=Math.floor(G.camX/TW),endCol=Math.ceil((G.camX+VW)/TW);
var startRow=Math.floor(G.camY/TH),endRow=Math.ceil((G.camY+VH)/TH);
for(var row=startRow;row<=endRow;row++){
for(var col=startCol;col<=endCol;col++){
ctx.drawImage(G.groundCanvas,col*TW,row*TH);
}
}
}
// Map border
ctx.shadowColor='rgba(255,180,0,0.5)';ctx.shadowBlur=12;
ctx.strokeStyle='rgba(255,180,0,0.35)';ctx.lineWidth=8;
ctx.strokeRect(0,0,WW,WH);ctx.shadowBlur=0;
ctx.restore();

// World objects (flowers first, then trees on top, then props)
for(var oi=0;oi<WORLD_OBJS.length;oi++){
var wobj=WORLD_OBJS[oi];
if(wobj.type==='flower')drawFlower(wobj);
}
for(var oi2=0;oi2<WORLD_PROPS.length;oi2++){
var wp=WORLD_PROPS[oi2];
if(!wp.dead){if(wp.type==='barrel')drawBarrelProp(wp,now);else drawCarProp(wp,now);}
}
for(var oi3=0;oi3<WORLD_OBJS.length;oi3++){
var wobj2=WORLD_OBJS[oi3];
if(wobj2.type==='tree'&&!wobj2.dead)drawTree(wobj2,now);
}

// Weather overlays (screen space)
drawWeather(THEMES[G.groundTheme%THEMES.length],now);

// Pickups
for(var pi=0;pi<G.pickups.length;pi++){if(!G.pickups[pi].collected)drawPickupAt(G.pickups[pi],now);}

// Particles
ctx.save();
for(var parti=0;parti<G.particles.length;parti++){
var p=G.particles[parti];var psx=p.x-G.camX,psy=p.y-G.camY;
if(psx<-20||psx>VW+20||psy<-20||psy>VH+20)continue;
ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(psx,psy,p.r,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;ctx.restore();

// Saw blades
for(var sbi=0;sbi<G.sawBlades.length;sbi++){
var sb=G.sawBlades[sbi];
var sbsx=G.squadX+Math.cos(sb.angle)*sb.radius-G.camX;
var sbsy=G.squadY+Math.sin(sb.angle)*sb.radius-G.camY;

var ytPlayer=null,ytPendingPlay=false,musicVolume=0.6,sfxVolume=0.6;
var DEFAULT_YT='https://youtu.be/XMcbjp4Sq4M';

function ytExtract(url){
try{
var pl=url.match(/[?&]list=([A-Za-z0-9_-]+)/);
if(pl)return{type:'playlist',id:pl[1]};
var v=url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
if(v)return{type:'video',id:v[1]};
}catch(e){}
return null;
}
function onYouTubeIframeAPIReady(){
ytPlayer=new YT.Player('ytPlayerContainer',{height:'200',width:'200',
playerVars:{autoplay:0,controls:0,loop:1},
events:{
onReady:function(e){e.target.setVolume(Math.round(musicVolume*100));if(ytPendingPlay){ytPendingPlay=false;ytStartMusic();}},
onStateChange:function(e){if(e.data===YT.PlayerState.ENDED)ytStartMusic();}
}});}
function ytStartMusic(){
if(ytPlayer&&ytPlayer.loadVideoById){
var url=document.getElementById('ytInput').value.trim()||DEFAULT_YT;
var info=ytExtract(url);
if(info){
if(info.type==='playlist'){ytPlayer.loadPlaylist({list:info.id,listType:'playlist',index:0});}
else{ytPlayer.loadVideoById(info.id);}
}
ytPlayer.unMute();ytPlayer.setVolume(Math.round(musicVolume*100));ytPlayer.playVideo();
document.getElementById('musicStatus').textContent='Playing';
} else { ytPendingPlay=true; }
}

document.getElementById('closeCog').addEventListener('click',function(){document.getElementById('cogMenuOverlay').classList.remove('show');});
document.getElementById('cogMenuOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.getElementById('ytPlay').addEventListener('click',function(){
var url=document.getElementById('ytInput').value.trim()||DEFAULT_YT;
if(ytPlayer&&ytPlayer.unMute){
var info=ytExtract(url);if(!info){document.getElementById('musicStatus').textContent='Invalid URL';return;}
if(info.type==='playlist'){ytPlayer.loadPlaylist({list:info.id,listType:'playlist',index:0});}
else{ytPlayer.loadVideoById(info.id);}
ytPlayer.unMute();ytPlayer.setVolume(Math.round(musicVolume*100));ytPlayer.playVideo();
document.getElementById('musicStatus').textContent='Playing';
} else { ytPendingPlay=true; }
});
document.getElementById('ytStop').addEventListener('click',function(){

document.getElementById('musicStatus').textContent='Stopped';
});

for(var i=0;i<220;i++){
stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,
a:Math.random()*0.5+0.4,tw:Math.random()*Math.PI*2,ts:Math.random()*0.003+0.0005});
}
function drawFrame(){
var w=canvas.width,h=canvas.height;
if(w===0||h===0){raf=requestAnimationFrame(drawFrame);return;}
ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
for(var i=0;i<stars.length;i++){
var s=stars[i];s.tw+=s.ts;
ctx.beginPath();ctx.arc(s.x*w,s.y*h,s.r,0,Math.PI*2);
ctx.fillStyle='rgba(255,100,40,'+(s.a*(0.5+0.5*Math.sin(s.tw)))+')';ctx.fill();
}
ctx.save();ctx.translate(w/2,h*0.36);
var fs=Math.min(w*0.17,h*0.11,70);
var lg=fs*1.18;
var lines=['ZOMBIE','SURVIVORS'];
ctx.textAlign='center';ctx.textBaseline='middle';
for(var li=0;li<lines.length;li++){
var ly=(li-(lines.length-1)/2)*lg;
ctx.font='900 '+fs+'px Arial Black,Arial,sans-serif';
ctx.shadowColor='rgba(255,40,0,0.95)';ctx.shadowBlur=28;
ctx.fillStyle='rgba(160,15,0,0.3)';ctx.fillText(lines[li],4,ly+4);
ctx.shadowColor='rgba(255,140,0,0.8)';ctx.shadowBlur=36;
var grd=ctx.createLinearGradient(-w*0.3,-fs*0.5,w*0.3,fs*0.5);
grd.addColorStop(0,'#ff2200');grd.addColorStop(0.4,'#ffaa00');
grd.addColorStop(0.7,'#ff4400');grd.addColorStop(1,'#ff2200');
ctx.fillStyle=grd;ctx.fillText(lines[li],0,ly);
shine=(shine+0.002)%1;
var sw=w*0.45;
var sg=ctx.createLinearGradient(-sw+shine*sw*2.5,ly-fs,-sw+shine*sw*2.5+sw*0.4,ly+fs);
sg.addColorStop(0,'rgba(255,255,255,0)');sg.addColorStop(0.5,'rgba(255,255,255,0.38)');sg.addColorStop(1,'rgba(255,255,255,0)');
ctx.fillStyle=sg;ctx.shadowBlur=0;ctx.fillText(lines[li],0,ly);
}
ctx.restore();
ctx.save();ctx.font='bold '+Math.min(w*0.028,13)+'px Arial Black,Arial,sans-serif';
ctx.textAlign='center';ctx.fillStyle='rgba(255,160,80,0.8)';
ctx.shadowColor='rgba(255,80,0,0.5)';ctx.shadowBlur=10;
ctx.fillText('SURVIVE THE HORDE. KILL THE KINGS.',w/2,h*0.36+lg*1.5);ctx.restore();
blinkCount++;if(blinkCount%48===0)blinkOn=!blinkOn;
if(blinkOn){
ctx.save();ctx.font='bold '+Math.min(w*0.036,14)+'px Arial Black,Arial,sans-serif';
ctx.textAlign='center';ctx.fillStyle='rgba(255,210,0,0.92)';
ctx.shadowColor='rgba(255,200,0,0.7)';ctx.shadowBlur=10;
ctx.fillText('TAP TO BEGIN',w/2,h*0.82);ctx.restore();
}
raf=requestAnimationFrame(drawFrame);
}
function proceed(){
if(done)return;done=true;
cancelAnimationFrame(raf);
unlockAudio();
var alpha=0;
function fadeOut(){
alpha+=0.05;
ctx.fillStyle='rgba(0,0,0,'+Math.min(alpha,1)+')';
ctx.fillRect(0,0,canvas.width,canvas.height);
if(alpha<1){requestAnimationFrame(fadeOut);}
else{document.getElementById('audioPermModal').style.display='flex';}
}
fadeOut();
}
canvas.addEventListener('click',proceed);
canvas.addEventListener('touchend',function(e){e.preventDefault();proceed();},{passive:false});
drawFrame();
})();

// MAIN GAME LOOP — exactly like Zombie Horde
// During 'title': does nothing (title IIFE handles it)
// During 'playing': updates and draws game
function loop(now){
if(gameMode==='playing'){
if(G&&!G.gameOver){
if(!jsActive){
var kx=0,ky=0;
if(keys['ArrowLeft']||keys['a'])kx=-1;else if(keys['ArrowRight']||keys['d'])kx=1;
if(keys['ArrowUp']||keys['w'])ky=-1;else if(keys['ArrowDown']||keys['s'])ky=1;
if(kx||ky){jsActive=true;jsVX=kx;jsVY=ky;}else jsActive=false;
}
update(now);
draw(now);
}
}
// title mode: do nothing — title IIFE draws itself
requestAnimationFrame(loop);
}

function startGame(){
cashTierIdx=0;G=makeState();initSoldiers(G);
buildWorldObjects(G.groundTheme);
lastTime=performance.now();
document.getElementById('joystickZone').style.display='block';
document.getElementById('cogBtn').style.display='flex';
showBanner('WAVE 1\nGRASSLAND');
gameMode='playing';
}

// Audio modal — exactly like Zombie Horde
document.getElementById('enableAudioBtn').addEventListener('click',function(){
unlockAudio();ytStartMusic();
document.getElementById('audioPermModal').style.display='none';
startGame();
});
document.getElementById('skipAudioBtn').addEventListener('click',function(){
document.getElementById('audioPermModal').style.display='none';
startGame();
});
document.getElementById('retryBtn').addEventListener('click',function(){
document.getElementById('gameOverScreen').classList.remove('show');
startGame();
});

// Start the single persistent loop — exactly like Zombie Horde
requestAnimationFrame(loop);
</script>
